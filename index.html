<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You're Invited 👀</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      text-align: center;
      padding-top: 100px;
    }
    .card {
      background: rgba(0,0,0,0.2);
      padding: 40px;
      border-radius: 20px;
      display: inline-block;
    }
    h1 {
      font-size: 2.5em;
    }
    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .yes {
      background-color: #4CAF50;
      color: white;
    }
    .no {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Hey 👀</h1>
  <p>I was thinking…</p>
  <p><strong>You 🤝 Me 🤝 Universal Studios</strong></p>
  <p>This weekend?</p>

  <button class="yes" onclick="yesClicked()">Yes 😄</button>
  <button class="no" id="noBtn" onmouseover="moveButton()">No 🙃</button>
</div>

<script>
function yesClicked() {
  document.body.innerHTML = "<h1>Perfect 😌 I’ll text you the details.</h1>";
}

function moveButton() {
  const btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
