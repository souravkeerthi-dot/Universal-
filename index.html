<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 👀</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ff7e5f, #feb47b);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

.container {
  padding: 60px 20px;
}

h1 {
  font-size: 2.8em;
  animation: fadeIn 1s ease-in-out;
}

p {
  font-size: 1.2em;
  margin: 10px 0;
}

img {
  width: 280px;
  border-radius: 20px;
  margin: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  animation: float 3s infinite ease-in-out;
}

.buttons {
  margin-top: 30px;
}

button {
  padding: 15px 30px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

.yes {
  background: #4CAF50;
  color: white;
}

.yes:hover {
  transform: scale(1.1);
}

.no {
  background: #ff4d4d;
  color: white;
  position: absolute;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey 👀</h1>
  <p>I had a slightly dangerous idea...</p>
  <p><strong>You 🤝 Me 🤝 Universal Studios 🎢</strong></p>
  <p>Rides, chaos, snacks, and me pretending I’m not scared 😌</p>

  <!-- Images -->
  <img src="https://images.unsplash.com/photo-1601924582975-7f5b6f3bb6fa" />
  <img src="https://images.unsplash.com/photo-1581322337649-3a4d7f1c6a89" />

  <p>So… what do you say?</p>

  <div class="buttons">
    <button class="yes" onclick="yesClicked()">Yes 😄</button>
    <button class="no" id="noBtn" onmouseover="moveButton()">No 🙃</button>
  </div>
</div>

<script>
function yesClicked() {
  document.body.innerHTML = `
    <div style="padding-top:100px; text-align:center; color:white;">
      <h1>Perfect 😌</h1>
      <p>I knew you had good taste.</p>
      <p>I’ll text you the plan 🎢</p>
    </div>
  `;
}

function moveButton() {
  const btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
