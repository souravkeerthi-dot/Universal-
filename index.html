<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 👀</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #ff7e5f, #feb47b);
  color: white;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

h1 {
  font-size: 2.5em;
}

img {
  width: 260px;
  border-radius: 15px;
  margin: 10px;
}

button {
  padding: 15px 25px;
  margin: 10px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.yes {
  background: green;
  color: white;
}

.no {
  background: red;
  color: white;
  position: absolute;
}
</style>
</head>

<body>

<div class="container">
  <h1>Hey 👀</h1>
  <p>I have a plan...</p>
  <p><strong>You + Me + Universal Studios 🎢</strong></p>
  <p>Rides, food, and me acting brave 😌</p>

  <!-- WORKING IMAGES -->
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Universal_Studios_Hollywood.jpg">
  <img src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Roller_coaster.jpg">

  <p>So… are you in?</p>

  <button class="yes" onclick="yesClicked()">Yes 😄</button>
  <button class="no" id="noBtn" onmouseover="moveButton()">No 🙃</button>
</div>

<script>
function yesClicked() {
  document.body.innerHTML = "<h1 style='margin-top:100px;'>Perfect 😌 I’ll text you the details.</h1>";
}

function moveButton() {
  const btn = document.getElementById("noBtn");
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
}
</script>

</body>
</html>
